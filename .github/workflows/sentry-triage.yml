name: Sentry Triage

on:
  workflow_call:
    inputs:
      sentry_issue_url:
        description: Sentry issue URL
        required: true
        type: string
      sha:
        description: Git branch or SHA to fetch code from
        required: false
        type: string
        default: "main"
      auto_fix:
        description: Whether to attempt auto-fix
        required: false
        type: boolean
        default: true
      tracker_type:
        description: "Tracker type: github, linear, or jira"
        required: false
        type: string
        default: "github"
      tracker_labels:
        description: Comma-separated labels for the tracker issue
        required: false
        type: string
        default: "bug,sentry"
      api_url:
        description: DonMerge API base URL
        required: false
        type: string
        default: "https://donmerge.dev"
    secrets:
      DONMERGE_API_KEY:
        required: true
      SENTRY_AUTH_TOKEN:
        required: true
      LINEAR_API_KEY:
        required: false
      JIRA_API_KEY:
        required: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  triage:
    name: Sentry Issue Triage
    runs-on: ubuntu-latest
    steps:
      - name: Trigger triage
        uses: actions/github-script@v7
        id: trigger
        env:
          DONMERGE_API_KEY: ${{ secrets.DONMERGE_API_KEY }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          GITHUB_TOKEN_SECRET: ${{ secrets.GITHUB_TOKEN }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          JIRA_API_KEY: ${{ secrets.JIRA_API_KEY }}
        with:
          script: |
            const apiUrl = `${{ inputs.api_url }}`;
            const apiKey = process.env.DONMERGE_API_KEY;
            const sentryToken = process.env.SENTRY_AUTH_TOKEN;
            const sentryIssueUrl = `${{ inputs.sentry_issue_url }}`;

            // --- Step 1: Parse Sentry URL to extract org and issue ID ---
            // Expected format: https://sentry.io/organizations/{org}/issues/{id}/
            const urlPattern = /organizations\/([^/]+)\/issues\/(\d+)/;
            const match = sentryIssueUrl.match(urlPattern);
            if (!match) {
              core.setFailed(`Could not parse Sentry URL: ${sentryIssueUrl}`);
              return;
            }
            const org = match[1];
            const issueId = match[2];
            core.info(`Parsed Sentry URL — org: ${org}, issue ID: ${issueId}`);

            // --- Step 2: Fetch Sentry issue data ---
            const sentryBase = "https://sentry.io/api/0";

            const issueRes = await fetch(
              `${sentryBase}/organizations/${org}/issues/${issueId}/`,
              { headers: { "Authorization": `Bearer ${sentryToken}` } }
            );
            if (!issueRes.ok) {
              core.setFailed(`Sentry issue fetch failed (HTTP ${issueRes.status}): ${await issueRes.text()}`);
              return;
            }
            const issue = await issueRes.json();

            // Fetch latest events for stack trace data
            const eventsRes = await fetch(
              `${sentryBase}/organizations/${org}/issues/${issueId}/events/?limit=5`,
              { headers: { "Authorization": `Bearer ${sentryToken}` } }
            );
            const events = eventsRes.ok ? (await eventsRes.json()) : [];
            if (!eventsRes.ok) {
              core.warning(`Sentry events fetch returned HTTP ${eventsRes.status}, proceeding without events`);
            }

            // --- Step 3: Build error_context from Sentry data ---
            function formatStackFromEvents(evts) {
              if (!evts || evts.length === 0) return "";
              // Collect exception stack frames from the most recent event
              const evt = evts[0];
              const entries = evt.entries || [];
              for (const entry of entries) {
                if (entry.type === "exception" && entry.data?.values) {
                  for (const ex of entry.data.values) {
                    if (ex.stacktrace?.frames) {
                      return ex.stacktrace.frames
                        .map(f => `  at ${f.function || "<anonymous>"} (${f.filename}:${f.lineno || "?"}:${f.colno || "?"})`)
                        .join("\n");
                    }
                  }
                }
              }
              return "";
            }

            function extractInAppPathsFromEvents(evts) {
              const paths = new Set();
              for (const evt of (evts || [])) {
                const entries = evt.entries || [];
                for (const entry of entries) {
                  if (entry.type === "exception" && entry.data?.values) {
                    for (const ex of entry.data.values) {
                      for (const frame of (ex.stacktrace?.frames || [])) {
                        if (frame.inApp && frame.filename) {
                          paths.add(frame.filename);
                        }
                      }
                    }
                  }
                }
              }
              return [...paths];
            }

            function mapSeverity(level) {
              const map = { fatal: "critical", error: "high", warning: "medium", info: "low", debug: "low" };
              return map[level] || "medium";
            }

            const errorContext = {
              title: issue.title || "Unknown Sentry Error",
              description: `Error in ${issue.platform || "unknown"} environment ${issue.environment || "unknown"}`,
              stack_trace: formatStackFromEvents(events),
              affected_files: extractInAppPathsFromEvents(events),
              severity: mapSeverity(issue.level),
              environment: issue.environment || "unknown",
              metadata: {
                sentry_issue_id: String(issue.id),
                sentry_short_id: issue.shortId || "",
                occurrences: String(issue.count || 0),
                users_affected: String(issue.userCount || 0)
              },
              source_url: sentryIssueUrl
            };

            core.info(`Built error_context — title: "${errorContext.title}", severity: ${errorContext.severity}, affected_files: ${errorContext.affected_files.length}`);

            // --- Step 4: Determine tracker token and POST to /api/v1/triage ---
            const trackerType = `${{ inputs.tracker_type }}`;
            let trackerToken = process.env.GITHUB_TOKEN_SECRET;
            if (trackerType === "linear") {
              trackerToken = process.env.LINEAR_API_KEY;
            } else if (trackerType === "jira") {
              trackerToken = process.env.JIRA_API_KEY;
            }

            const labels = `${{ inputs.tracker_labels }}`
              .split(",")
              .map(l => l.trim())
              .filter(l => l.length > 0);

            const body = {
              repo: `${{ github.repository }}`,
              error_context: errorContext,
              github_token: process.env.GITHUB_TOKEN_SECRET,
              sha: `${{ inputs.sha }}`,
              tracker: {
                type: trackerType,
                token: trackerToken,
                team: "eng",
                labels: labels
              },
              options: {
                auto_fix: ${{ inputs.auto_fix }}
              }
            };

            const response = await fetch(`${apiUrl}/api/v1/triage`, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${apiKey}`
              },
              body: JSON.stringify(body)
            });

            if (response.status !== 202) {
              const errorText = await response.text();
              core.setFailed(`Triage trigger failed (HTTP ${response.status}): ${errorText}`);
              return;
            }

            const data = await response.json();
            core.setOutput("job_id", data.job_id);
            core.info(`Triage job started: ${data.job_id}`);

      - name: Poll triage status
        uses: actions/github-script@v7
        id: poll
        if: steps.trigger.outputs.job_id
        env:
          DONMERGE_API_KEY: ${{ secrets.DONMERGE_API_KEY }}
        with:
          script: |
            const apiUrl = `${{ inputs.api_url }}`;
            const apiKey = process.env.DONMERGE_API_KEY;
            const jobId = `${{ steps.trigger.outputs.job_id }}`;
            const maxAttempts = 30;
            const intervalMs = 10000;

            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              core.info(`Polling attempt ${attempt}/${maxAttempts}...`);

              const response = await fetch(`${apiUrl}/api/v1/status/${jobId}`, {
                headers: {
                  "Authorization": `Bearer ${apiKey}`
                }
              });

              if (!response.ok) {
                core.warning(`Status check returned HTTP ${response.status}`);
                await new Promise(r => setTimeout(r, intervalMs));
                continue;
              }

              const data = await response.json();

              if (data.status === "complete") {
                core.setOutput("result", JSON.stringify(data.result));
                core.setOutput("triage_failed", "false");
                core.info("Triage completed successfully.");
                return;
              }

              if (data.status === "failed") {
                const errorMsg = data.error || data.result?.error || "Unknown error";
                core.setOutput("result", JSON.stringify(data.result || {}));
                core.setOutput("triage_failed", "true");
                core.setOutput("error_message", errorMsg);
                core.warning(`Triage failed: ${errorMsg}`);
                return;
              }

              await new Promise(r => setTimeout(r, intervalMs));
            }

            core.setOutput("triage_failed", "true");
            core.setOutput("error_message", "Polling timed out after 30 attempts (5 minutes)");
            core.warning("Polling timed out — triage may still be running on the server.");

      - name: Report triage result
        uses: actions/github-script@v7
        if: always() && steps.poll.outputs.result
        with:
          script: |
            const result = JSON.parse(`${{ steps.poll.outputs.result }}`);
            const triageFailed = `${{ steps.poll.outputs.triage_failed }}` === "true";
            const errorMessage = `${{ steps.poll.outputs.error_message }}`;

            // Build summary
            let summary = `## 🔍 Sentry Triage Result\n\n`;
            summary += `**Issue:** ${{ inputs.sentry_issue_url }}\n`;
            summary += `**Repo:** ${{ github.repository }}\n`;
            summary += `**SHA:** ${{ inputs.sha }}\n\n`;

            if (result.root_cause) {
              summary += `### Root Cause\n${result.root_cause}\n\n`;
            }
            if (result.severity) {
              summary += `**Severity:** ${result.severity}\n\n`;
            }
            if (result.confidence) {
              summary += `**Confidence:** ${result.confidence}\n\n`;
            }
            if (result.affected_files && result.affected_files.length > 0) {
              summary += `### Affected Files\n`;
              for (const file of result.affected_files) {
                summary += `- \`${file}\`\n`;
              }
              summary += `\n`;
            }
            if (result.suggested_fix) {
              summary += `### Suggested Fix\n${result.suggested_fix}\n\n`;
            }
            if (result.fix_pr_url) {
              summary += `**Fix PR:** ${result.fix_pr_url}\n\n`;
            }
            if (result.tracker_issue_url) {
              summary += `**Tracker Issue:** ${result.tracker_issue_url}\n\n`;
            }

            if (triageFailed) {
              summary += `### ❌ Triage Failed\n${errorMessage}\n`;
            } else {
              summary += `### ✅ Triage Complete\n`;
            }

            await core.summary.addRaw(summary).write();

            if (triageFailed) {
              core.setFailed(`Triage failed: ${errorMessage}`);
            }
