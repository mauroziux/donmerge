name: Deploy

on:
  push:
    branches: [main]

# Required GitHub configuration:
#   Secret:  CLOUDFLARE_API_TOKEN  — Cloudflare API token with Workers deploy permissions
#   Variable: WORKER_BASE_URL      — Full base URL of the deployed worker
#            e.g. https://tableo-assitant-worker.my-account.workers.dev

jobs:
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Deploy worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  verify:
    name: Post-deploy verification
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run smoke tests
        run: bash scripts/verify-deploy.sh "${{ vars.WORKER_BASE_URL }}"
