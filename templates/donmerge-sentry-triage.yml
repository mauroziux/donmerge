#         || `https://sentry.io/organizations/${sentryPayload?.data?.organization?.slug}/issues/${sentryPayload?.data?.issue?.id}/`;
#
#       await fetch(
#         `https://api.github.com/repos/${env.GITHUB_REPO}/dispatches`,
#         {
#           method: 'POST',
#           headers: {
#             Authorization: `Bearer ${env.GITHUB_TOKEN}`,
#             Accept: 'application/vnd.github+json',
#             'Content-Type': 'application/json',
#           },
#           body: JSON.stringify({
#             event_type: 'sentry-issue',
#             client_payload: {
#               sentry_issue_url: issueUrl,
#               sha: 'main',  // optional: use specific commit SHA
#             },
#           }),
#         }
#       );
#
#       return new Response('ok', { status: 200 });
#     }
#   };
#
# Option B: Use a no-code platform like Zapier, Make, or Pipedream to bridge
#           the Sentry webhook into a GitHub repository_dispatch event.
#
# In Sentry: Settings → Integrations → Webhooks → Add your bridge URL
# ──────────────────────────────────────────────────────────────────────────────
